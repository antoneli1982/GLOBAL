<!doctype html>
<html lang="pt-BR" data-theme="dark">
<!--
  ============================================================
  CENTRAL DE OPERAÇÕES · SESÉ  —  painel de acesso às ferramentas
  ============================================================

  COMO ADICIONAR / EDITAR UMA FERRAMENTA:
  Procure a lista "const TOOLS = [" mais abaixo (perto do fim do arquivo).
  Cada ferramenta é um bloco assim:

      {
        emoji:  "🧼",
        name:   "SAS · Lavadora de Embalagem",
        desc:   "Apontamento do departamento de lavagem",
        url:    "https://antoneli1982.github.io/packing/",
        accent: "#34d3c0"
        // offline: true   // (opcional) SÓ com certeza de que está fora do ar
      },                   //           -> mostra alerta vermelho "Fora do ar".
                           // Sem essa linha, o cartão não exibe nenhum status.

  É só copiar um bloco, colar e trocar os dados. Salve o arquivo.

  COMO PUBLICAR (GitHub Pages):
  - Opção recomendada: crie um repositório chamado exatamente
    "antoneli1982.github.io", coloque este arquivo como index.html na raiz,
    ative Pages (branch main). O painel fica em: https://antoneli1982.github.io/
  - Ou coloque em qualquer outro repositório (ex.: "painel") -> fica em
    https://antoneli1982.github.io/painel/
  Os links das ferramentas são absolutos, então funcionam de qualquer lugar.
  ============================================================
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d13">
<title>Central de Apontamentos Operacionais · SESÉ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a0d13; --bg-elev:#0e1219; --panel:#141b26; --panel-hi:#1a2431;
    --line:#243042; --line-soft:#1a2230;
    --ink:#eef2f8; --ink-dim:#94a2b6; --ink-faint:#5c6a7d;
    --amber:#f2a81d; --amber-soft:rgba(242,168,29,.14);
    --led-on:#3fce7c; --led-warn:#f2a81d;
    --alert:#ff5a5a; --alert-soft:rgba(255,90,90,.14);
    --shadow:0 24px 50px -22px rgba(0,0,0,.75);
    --radius:16px;
    --math-ink:#43597a; --math-accent:#f2a81d;
  }
  html[data-theme="light"]{
    --bg:#eceff5; --bg-elev:#e4e8f0; --panel:#ffffff; --panel-hi:#f4f7fb;
    --line:#d3dae6; --line-soft:#e4e9f1;
    --ink:#151d29; --ink-dim:#53627a; --ink-faint:#8592a6;
    --amber:#b97400; --amber-soft:rgba(185,116,0,.12);
    --led-on:#1f9d57; --led-warn:#b97400;
    --alert:#d92d2d; --alert-soft:rgba(217,45,45,.10);
    --shadow:0 18px 38px -22px rgba(31,45,71,.30);
    --math-ink:#9aa9bf; --math-accent:#c68a17;
  }

  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:"Poppins",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
    padding:clamp(18px,4vw,40px);
    position:relative; overflow-x:hidden;
    transition:background .4s ease,color .4s ease;
  }
  /* faint technical grid + line glow behind everything */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(900px 420px at 12% -8%, var(--amber-soft), transparent 60%),
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size:100% 100%, 46px 46px, 46px 46px;
    opacity:.28; mask-image:linear-gradient(180deg,#000 0%,#000 55%,transparent 100%);
  }
  /* ---------- Blueprint de cálculo integral (fundo) ---------- */
  .math-bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
           -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.32) 0%,#000 26%,#000 74%,transparent 100%);
                   mask-image:linear-gradient(180deg,rgba(0,0,0,.32) 0%,#000 26%,#000 74%,transparent 100%)}
  .math-bg svg{width:100%; height:100%; display:block}
  .math-bg .mb-axis{fill:none; stroke:var(--math-ink); stroke-width:1.5; opacity:.55}
  .math-bg .mb-tick{stroke:var(--math-ink); stroke-width:1.3; opacity:.5}
  .math-bg .mb-curve{fill:none; stroke:var(--math-accent); stroke-width:2.4;
                     stroke-linejoin:round; stroke-linecap:round; opacity:.62}
  .math-bg .mb-area{fill:var(--math-accent); opacity:.08}
  .math-bg .mb-strip{fill:var(--math-accent); opacity:.06}
  .math-bg .mb-sep{stroke:var(--math-accent); stroke-width:.9; opacity:.28}
  .math-bg .mb-dash{fill:none; stroke:var(--math-ink); stroke-width:1;
                    stroke-dasharray:4 5; opacity:.45}
  .math-bg .mb-glyph{fill:var(--math-accent); opacity:.10;
                     font-family:Georgia,"Times New Roman",serif; font-style:italic}
  .math-bg .mb-formula{fill:var(--math-ink); opacity:.58;
                       font-family:Georgia,"Times New Roman",serif; font-style:italic}
  .math-bg .mb-label{fill:var(--math-ink); opacity:.6;
                     font-family:Georgia,serif; font-style:italic}
  @media (max-width:560px){ .math-bg{opacity:.7} }

  .wrap{position:relative; z-index:1; width:100%; max-width:1060px; margin:0 auto; flex:1;
        display:flex; flex-direction:column}

  /* ---------- Header (HMI) ---------- */
  header{
    display:flex; justify-content:space-between; align-items:flex-end;
    gap:24px; flex-wrap:wrap;
    padding-bottom:20px; margin-bottom:26px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap}
  .brand-logo{height:22px; width:auto; display:block; flex:0 0 auto}
  .live-dot{width:9px; height:9px; border-radius:50%; background:var(--led-on);
            box-shadow:0 0 0 0 var(--led-on); animation:pulse 2.4s ease-out infinite}
  .eyebrow .label{font-family:"JetBrains Mono",monospace; font-size:.7rem; letter-spacing:.22em;
                  text-transform:uppercase; color:var(--ink-dim)}
  .chip{font-family:"JetBrains Mono",monospace; font-size:.66rem; letter-spacing:.14em;
        color:var(--amber); border:1px solid var(--amber); border-radius:6px;
        padding:2px 7px; background:var(--amber-soft)}
  h1{margin:0; font-size:clamp(1.6rem,4.2vw,2.5rem); font-weight:700; line-height:1.05;
     letter-spacing:-.01em}
  .sub{margin:8px 0 0; color:var(--ink-dim); font-size:.95rem; font-weight:400}

  .panelbox{display:flex; align-items:center; gap:14px}
  .readout{text-align:right; line-height:1}
  .clock{font-family:"JetBrains Mono",monospace; font-size:1.5rem; font-weight:500;
         letter-spacing:.04em; font-variant-numeric:tabular-nums}
  .date{font-family:"JetBrains Mono",monospace; font-size:.68rem; letter-spacing:.16em;
        text-transform:uppercase; color:var(--ink-faint); margin-top:5px}
  .toggle{width:42px; height:42px; flex:0 0 auto; border-radius:11px; cursor:pointer;
          background:var(--panel); border:1px solid var(--line); color:var(--ink);
          font-size:1.05rem; display:grid; place-items:center;
          transition:border-color .2s, background .2s, transform .15s}
  .toggle:hover{border-color:var(--amber); transform:translateY(-1px)}
  .toggle:focus-visible{outline:2px solid var(--amber); outline-offset:2px}

  /* ---------- Tool grid ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(258px,1fr));
        gap:16px; align-content:start}

  .tool{
    --card-accent:var(--amber);
    position:relative; display:flex; flex-direction:column;
    text-decoration:none; color:inherit;
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); padding:22px 20px 18px;
    overflow:hidden; min-height:186px;
    transition:transform .18s ease, border-color .18s ease, box-shadow .25s ease, background .2s ease;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) backwards;
  }
  .tool::before{content:""; position:absolute; left:0; top:0; height:3px; width:100%;
                background:var(--card-accent); opacity:.85}
  .tool::after{content:""; position:absolute; inset:0; border-radius:var(--radius);
               box-shadow:inset 0 0 0 1px transparent; pointer-events:none; transition:box-shadow .25s}
  .tool:hover{transform:translateY(-5px); border-color:var(--card-accent);
              background:var(--panel-hi); box-shadow:var(--shadow)}
  .tool:hover::after{box-shadow:inset 0 0 34px -12px var(--card-accent)}
  .tool:focus-visible{outline:2px solid var(--card-accent); outline-offset:3px}

  .tool-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px}
  .icon{width:52px; height:52px; border-radius:13px; display:grid; place-items:center;
        font-size:1.55rem; background:color-mix(in srgb,var(--card-accent) 16%, transparent);
        border:1px solid color-mix(in srgb,var(--card-accent) 34%, transparent)}
  .status{display:flex; align-items:center; gap:7px;
          font-family:"JetBrains Mono",monospace; font-size:.62rem; letter-spacing:.12em;
          text-transform:uppercase}
  .status.alert{color:var(--alert); background:var(--alert-soft);
                border:1px solid color-mix(in srgb,var(--alert) 45%, transparent);
                padding:3px 9px; border-radius:999px; font-weight:700}
  .led{width:8px; height:8px; border-radius:50%}
  .led.off{background:var(--alert); box-shadow:0 0 8px 0 var(--alert);
           animation:pulseRed 2.2s ease-out infinite}
  /* cartão de ferramenta confirmada fora do ar */
  .tool.is-offline{border-color:color-mix(in srgb,var(--alert) 40%, transparent)}
  .tool.is-offline::before{background:var(--alert); opacity:1}
  .tool.is-offline:hover{border-color:var(--alert)}
  .tool.is-offline:hover::after{box-shadow:inset 0 0 34px -12px var(--alert)}

  .tool-name{margin:0; font-size:1.12rem; font-weight:600; line-height:1.22}
  .tool-desc{margin:6px 0 0; color:var(--ink-dim); font-size:.85rem; line-height:1.4}

  .tool-foot{margin-top:auto; padding-top:16px; display:flex; justify-content:space-between;
             align-items:center; gap:10px; border-top:1px solid var(--line-soft)}
  .host{font-family:"JetBrains Mono",monospace; font-size:.63rem; color:var(--ink-faint);
        letter-spacing:.02em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .go{font-size:.82rem; font-weight:600; color:var(--card-accent); white-space:nowrap;
      display:inline-flex; align-items:center; gap:5px}
  .go .arrow{transition:transform .18s ease}
  .tool:hover .go .arrow{transform:translateX(4px)}

  /* ---------- Footer ---------- */
  footer{margin-top:30px; padding-top:18px; border-top:1px solid var(--line);
         display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
         font-family:"JetBrains Mono",monospace; font-size:.66rem; letter-spacing:.12em;
         text-transform:uppercase; color:var(--ink-faint)}
  footer .hint{text-transform:none; letter-spacing:normal; font-family:"Poppins",sans-serif;
               font-size:.8rem; color:var(--ink-dim)}

  noscript{display:block; text-align:center; color:var(--ink-dim); padding:40px 0}

  @keyframes pulse{
    0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--led-on) 60%, transparent)}
    70%{box-shadow:0 0 0 8px transparent} 100%{box-shadow:0 0 0 0 transparent}
  }
  @keyframes pulseRed{
    0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--alert) 60%, transparent)}
    70%{box-shadow:0 0 0 8px transparent} 100%{box-shadow:0 0 0 0 transparent}
  }
  @keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

  @media (max-width:560px){
    header{align-items:flex-start}
    .clock{font-size:1.25rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important}
  }
</style>
</head>

<script>
  /* ===== Lista de ferramentas — edite aqui =====
     Por padrão o cartão NÃO mostra nenhum status (fica limpo).
     Só marque uma ferramenta quando tiver CERTEZA de que está fora do ar,
     adicionando   offline: true   ao item. Aí ele exibe um alerta vermelho
     "Fora do ar". Quando voltar ao normal, remova a linha (ou deixe false). */
  const TOOLS = [
    {
      emoji:  "🧼",
      name:   "SAS · Lavadora de Embalagem",
      desc:   "Apontamento do departamento de lavagem",
      url:    "https://antoneli1982.github.io/packing/",
      accent: "#34d3c0"
    },
    {
      emoji:  "📦",
      name:   "Materiais de Retorno de Linha",
      desc:   "Registro de retornos e pontos críticos",
      url:    "https://antoneli1982.github.io/controle_de_materiais_retorno_de_linha/",
      accent: "#f2a81d"
    },
    {
      emoji:  "📊",
      name:   "Dashboard Spot Check EA211",
      desc:   "Divergências e spot check por fornecedor",
      url:    "https://antoneli1982.github.io/spotcheck/",
      accent: "#a78bfa"
      // offline: true   // <- descomente SÓ com certeza de que está fora do ar
    }
  ];

  /* ===== Render dos cartões ===== */
  const grid = document.getElementById("grid");
  grid.innerHTML = TOOLS.map(t => {
    const host = t.url.replace(/^https?:\/\//, "").replace(/\/+$/, "");
    const offline = t.offline === true;
    const alertHtml = offline
      ? `<div class="status alert"><span class="led off"></span>Fora do ar</div>`
      : "";                                // sem certeza / no ar -> nada aparece
    return `
      <a class="tool${offline ? " is-offline" : ""}" role="listitem" href="${t.url}"
         style="--card-accent:${t.accent}" aria-label="Abrir ${t.name}${offline ? " (fora do ar)" : ""}">
        <div class="tool-top">
          <div class="icon" aria-hidden="true">${t.emoji}</div>
          ${alertHtml}
        </div>
        <h2 class="tool-name">${t.name}</h2>
        <p class="tool-desc">${t.desc}</p>
        <div class="tool-foot">
          <span class="host">${host}</span>
          <span class="go">Abrir <span class="arrow">→</span></span>
        </div>
      </a>`;
  }).join("");

  /* ===== Relógio ao vivo ===== */
  const clock = document.getElementById("clock");
  const dateEl = document.getElementById("date");
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  function tick(){
    const d = new Date();
    const p = n => String(n).padStart(2,"0");
    clock.textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    dateEl.textContent = `${dias[d.getDay()]} ${p(d.getDate())} ${meses[d.getMonth()]} ${d.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  /* ===== Tema claro/escuro (persistência best-effort) ===== */
  const root = document.documentElement, toggle = document.getElementById("toggle");
  let saved = null;
  try { saved = localStorage.getItem("sese-tema"); } catch(e){}
  if (saved) root.setAttribute("data-theme", saved);
  function paintToggle(){ toggle.textContent = root.getAttribute("data-theme") === "light" ? "🌙" : "☀️"; }
  paintToggle();
  toggle.addEventListener("click", () => {
    const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("sese-tema", next); } catch(e){}
    paintToggle();
  });
</script>
</body>
</html>
